stages:
- verify
- build
- test
- secret-detection
- docker
variables:
  SECRET_DETECTION_ENABLED: 'true'
include:
- template: Security/Secret-Detection.gitlab-ci.yml
cache:
  paths:
    - frontend/node_modules/
frontend_lint:
  stage: verify
  image: node:22-alpine
  script:
    - cd frontend
    - npm install
    - npm run lint

backend_check:
  stage: verify
  image: node:22-alpine
  script:
    - cd api
    - npm install
    - node --check index.js

frontend_build:
  stage: build
  image: node:22-alpine
  script:
    - cd frontend
    - npm install
    - npm run build
  artifacts:
    paths:
        - frontend/dist/
    expire_in: 1 week

docker_frontend:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_DRIVER: overlay2
  before_script:
    - echo "Logging in to Docker registry..."
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY

  script:
    - echo "Building Docker image..."
    - docker build -t "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA" ./frontend/
    - echo "Pushing Docker image..."
    - docker push "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA"

docker_backend:
  stage: docker
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_DRIVER: overlay2
  before_script:
    - echo "Logging in to Docker registry..."
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY

  script:
    - echo "Building Docker image..."
    - docker build -t "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA" ./api/
    - echo "Pushing Docker image..."
    - docker push "$CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHA"