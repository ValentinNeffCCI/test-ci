name: Test
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify_and_build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Install dependencies
        run: npm install
        working-directory: api

      - name: test lint frontend
        run: npm run lint
        working-directory: frontend

      - name: test lint backend
        run: node --check index.js
        working-directory: api

      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          TAG: ${{ github.sha }}
        run: |
          set -e
          docker compose -f docker-compose.prod.yaml build

          docker tag $DOCKER_USERNAME/react-cicd-api:latest $DOCKER_USERNAME/react-cicd-api:$TAG
          docker tag $DOCKER_USERNAME/react-cicd-frontend:latest $DOCKER_USERNAME/react-cicd-frontend:$TAG

          docker push $DOCKER_USERNAME/react-cicd-api:$TAG
          docker push $DOCKER_USERNAME/react-cicd-frontend:$TAG

  connect_to_vps:
    runs-on: ubuntu-latest
    needs: verify_and_build

    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose to VPS
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/key && chmod 600 /tmp/key
          scp -i /tmp/key -P ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            docker-compose.prod.yaml \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/react-cicd/
          rm /tmp/key

      - name: Deploy sur VPS
        uses: appleboy/ssh-action@v1
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          TAG: ${{ github.sha }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: DOCKER_USERNAME, TAG, DOCKER_TOKEN
          script: |
            set -e
            cd ~/react-cicd
            docker stop $(docker ps -aq) || true
            echo "DOCKER_USERNAME=$DOCKER_USERNAME" > .env
            echo "TAG=$TAG" >> .env
            echo "DOCKER_TOKEN=$DOCKER_TOKEN" >> .env
            echo "$DOCKER_TOKEN" | \
              docker login -u "$DOCKER_USERNAME" --password-stdin
            docker rm react-cicd-api react-cicd-frontend || true
            docker pull ${DOCKER_USERNAME}/react-cicd-api:latest
            docker pull ${DOCKER_USERNAME}/react-cicd-frontend:latest
            TAG=$TAG DOCKER_USERNAME=$DOCKER_USERNAME LOCAL_PORT=80 \
                          docker compose -f docker-compose.prod.yaml up -d
            docker compose -f docker-compose.prod.yaml ps
            exit 0
