name: Test
on:
  push:
    branches:
      - main

jobs:
  verify_and_build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Install dependencies
        run: npm install
        working-directory: api

      - name: test lint frontend
        run: npm run lint
        working-directory: frontend

      - name: test lint backend
        run: node --check index.js
        working-directory: api

      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker images
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          TAG: ${{ github.sha }}
        run: |
          docker compose -f docker-compose.prod.yaml build
          docker tag ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:$TAG
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_REPO }}:$TAG

  connect_to_vps:
    runs-on: ubuntu-latest
    needs: verify_and_build

    steps:
      - name: connect to vps
        run: ssh -i ${{ secrets.SSH_PRIVATE_KEY }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} -p ${{ secrets.SSH_PORT }}

      - name: stop working docker
        run: docker stop $(docker ps -q)

      - name: remove working docker
        run: docker rm $(docker ps -aq)

      - name: pull latest docker image
        run: docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPO }}:latest

      - name: run docker image
        run: docker run -d ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPO }}:latest

      - name: list running containers
        run: docker ps -a
